# TemporalFusion Training Configuration - Charades (Multi-Label)
# Launch: torchrun --nproc_per_node=8 -m temporalfusion.training --config configs/train_charades.yaml
# Charades: 157 action classes, multi-label, VGG features (4096-D)
# 7985 train + 1863 test videos

dataset: charades

data:
  train_dir: ./data/charades/features/train
  val_dir: ./data/charades/features/test
  annotations: ./data/charades/Charades
  max_frames: 512

model:
  feature_dim: 4096
  hidden_dim: 1024
  num_heads: 8
  num_layers: 6
  ff_mult: 4
  dropout: 0.1
  num_hierarchy_levels: 4
  num_classes: 157
  vl_embed_dim: 256
  enable_vl: false

training:
  batch_size: 32
  epochs: 100
  lr: 1.0e-4
  weight_decay: 1.0e-4
  warmup_epochs: 5
  num_workers: 6
  seed: 42
  label_smoothing: 0.0
  grad_accum_steps: 2
  multi_label: true

loss:
  lambda_tc: 1.0
  lambda_reg: 0.1
  lambda_cs: 0.5
  lambda_vl: 0.1
  collapse_tau: 0.1

performance:
  amp: 1
  compile_model: 0
  cudnn_benchmark: 1

logging:
  wandb_project: temporalfusion
  log_every: 10
  eval_every: 1
  save_every: 10
  output_dir: ./runs
